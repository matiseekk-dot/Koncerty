<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Byłem Na Żywo</title>

  <!-- PWA / iOS Home Screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Koncerty" />
  <meta name="theme-color" content="#0d0d0d" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #0d0d0d; color: #f0f0f0; min-height: 100%; }
    body { -webkit-tap-highlight-color: transparent; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    * { -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const LS_KEY = "koncerty_dane";

    const DEFAULT_VENUES = [
      { id: 1,  name: "Spodek",          city: "Katowice",  category: "Arena"    },
      { id: 2,  name: "Tauron Arena",     city: "Krakow",    category: "Arena"    },
      { id: 3,  name: "Atlas Arena",      city: "Lodz",      category: "Arena"    },
      { id: 4,  name: "PGE Narodowy",     city: "Warszawa",  category: "Arena"    },
      { id: 5,  name: "Torwar",           city: "Warszawa",  category: "Hala"     },
      { id: 6,  name: "Hala Stulecia",    city: "Wroclaw",   category: "Hala"     },
      { id: 7,  name: "Progresja",        city: "Warszawa",  category: "Klub"     },
      { id: 8,  name: "Stodola",          city: "Warszawa",  category: "Klub"     },
      { id: 9,  name: "Proxima",          city: "Warszawa",  category: "Klub"     },
      { id: 10, name: "Klub Studio",      city: "Krakow",    category: "Klub"     },
      { id: 11, name: "Kwadrat",          city: "Krakow",    category: "Klub"     },
      { id: 12, name: "B90",              city: "Gdansk",    category: "Klub"     },
      { id: 13, name: "PolandRock",       city: "Kostrzyn",  category: "Festiwal" },
      { id: 14, name: "Opener",           city: "Gdynia",    category: "Festiwal" },
      { id: 15, name: "OFF Festival",     city: "Katowice",  category: "Festiwal" },
      { id: 16, name: "Mystic Festival",  city: "Gdansk",    category: "Festiwal" },
    ];

    const VENUE_CATEGORIES = ["Arena", "Hala", "Klub", "Festiwal", "Plener", "Inne"];
    const VENUE_CAT_COLORS = {
      Arena: "#4cc8e8", Hala: "#a78bfa", Klub: "#e84c4c",
      Festiwal: "#f5c842", Plener: "#4ce87c", Inne: "#aaa",
    };

    const GENRES = ["Rock","Metal","Pop","Jazz","Hip-Hop","Electronic","Folk","Punk","Indie","Klasyka","Inne"];
    const GENRE_COLORS = {
      Rock:"#e84c4c", Metal:"#888", Pop:"#e84cbe", Jazz:"#e8b84c",
      "Hip-Hop":"#4ce87c", Electronic:"#4cc8e8", Folk:"#c8a46e",
      Punk:"#ff6b35", Indie:"#a78bfa", Klasyka:"#f0e4c8", Inne:"#aaa",
    };

    function dataLoad() {
      try { const v = localStorage.getItem(LS_KEY); if (v) return JSON.parse(v); } catch {}
      try { const v = sessionStorage.getItem(LS_KEY); if (v) return JSON.parse(v); } catch {}
      return null;
    }
    function dataSave(data) {
      const str = JSON.stringify(data);
      try { localStorage.setItem(LS_KEY, str); return; } catch {}
      try { sessionStorage.setItem(LS_KEY, str); } catch {}
    }

    // ── VenuePicker ──────────────────────────────────────────────
    function VenuePicker({ value, onChange, venues, onAddVenue }) {
      const [open, setOpen]       = useState(false);
      const [query, setQuery]     = useState("");
      const [addMode, setAddMode] = useState(false);
      const [newName, setNewName] = useState("");
      const [newCity, setNewCity] = useState("");
      const [newCat,  setNewCat]  = useState("Klub");
      const ref = useRef();

      useEffect(() => {
        const h = (e) => { if (ref.current && !ref.current.contains(e.target)) { setOpen(false); setAddMode(false); }};
        document.addEventListener("mousedown", h);
        return () => document.removeEventListener("mousedown", h);
      }, []);

      const filtered = venues.filter(v =>
        v.name.toLowerCase().includes(query.toLowerCase()) ||
        v.city.toLowerCase().includes(query.toLowerCase())
      );
      const grouped = VENUE_CATEGORIES.reduce((acc, cat) => {
        const list = filtered.filter(v => v.category === cat);
        if (list.length) acc[cat] = list;
        return acc;
      }, {});

      const selected = venues.find(v => v.id === value);
      const catColor = selected ? VENUE_CAT_COLORS[selected.category] : "#555";

      const handleAdd = () => {
        if (!newName.trim()) return;
        onAddVenue({ name: newName.trim(), city: newCity.trim(), category: newCat });
        setNewName(""); setNewCity(""); setNewCat("Klub"); setAddMode(false);
      };

      return (
        <div ref={ref} style={{ position: "relative" }}>
          <div onClick={() => { setOpen(o => !o); setAddMode(false); setQuery(""); }}
            style={{ background: "#1a1a1a", border: `1px solid ${open ? "#444" : "#2a2a2a"}`,
              borderRadius: 6, padding: "8px 10px", cursor: "pointer", display: "flex",
              alignItems: "center", gap: 8, minHeight: 46 }}>
            {selected ? (<>
              <span style={{ fontSize: 10, padding: "2px 7px", borderRadius: 12,
                background: `${catColor}22`, color: catColor, border: `1px solid ${catColor}44`,
                fontFamily: "'Space Mono', monospace", whiteSpace: "nowrap" }}>{selected.category}</span>
              <span style={{ fontSize: 14, color: "#f0f0f0", fontFamily: "'Space Mono', monospace", flex: 1 }}>{selected.name}</span>
              {selected.city && <span style={{ fontSize: 11, color: "#555", fontFamily: "'Space Mono', monospace" }}>{selected.city}</span>}
              <span onClick={e => { e.stopPropagation(); onChange(null); }}
                style={{ color: "#444", fontSize: 20, lineHeight: 1, cursor: "pointer", padding: "0 4px" }}>×</span>
            </>) : (
              <span style={{ fontSize: 14, color: "#555", fontFamily: "'Space Mono', monospace", flex: 1 }}>Wybierz miejsce…</span>
            )}
            <span style={{ color: "#444", fontSize: 10 }}>{open ? "▲" : "▼"}</span>
          </div>

          {open && (
            <div style={{ position: "absolute", top: "calc(100% + 4px)", left: 0, right: 0,
              background: "#1a1a1a", border: "1px solid #333", borderRadius: 8, zIndex: 100,
              maxHeight: 320, display: "flex", flexDirection: "column", overflow: "hidden",
              boxShadow: "0 8px 24px #00000088" }}>
              <div style={{ padding: "8px 10px", borderBottom: "1px solid #252525", flexShrink: 0 }}>
                <input value={query} onChange={e => setQuery(e.target.value)} autoFocus placeholder="Szukaj…"
                  style={{ width: "100%", background: "#111", border: "1px solid #2a2a2a", borderRadius: 5,
                    color: "#f0f0f0", padding: "8px", fontSize: 16,
                    fontFamily: "'Space Mono', monospace", outline: "none", boxSizing: "border-box" }} />
              </div>
              <div style={{ overflowY: "auto", flex: 1 }}>
                {Object.entries(grouped).map(([cat, list]) => (
                  <div key={cat}>
                    <div style={{ padding: "6px 10px 3px", fontSize: 9, color: VENUE_CAT_COLORS[cat],
                      letterSpacing: "0.2em", textTransform: "uppercase",
                      fontFamily: "'Space Mono', monospace", background: "#161616" }}>{cat}</div>
                    {list.map(v => (
                      <div key={v.id} onClick={() => { onChange(v.id); setOpen(false); setQuery(""); }}
                        style={{ padding: "10px 12px", cursor: "pointer", display: "flex", alignItems: "center", gap: 8,
                          background: value === v.id ? "#222" : "none",
                          borderLeft: value === v.id ? `3px solid ${VENUE_CAT_COLORS[cat]}` : "3px solid transparent" }}>
                        <span style={{ fontSize: 14, color: "#ccc", fontFamily: "'Space Mono', monospace", flex: 1 }}>{v.name}</span>
                        {v.city && <span style={{ fontSize: 11, color: "#555", fontFamily: "'Space Mono', monospace" }}>{v.city}</span>}
                        {value === v.id && <span style={{ color: VENUE_CAT_COLORS[cat], fontSize: 14 }}>✓</span>}
                      </div>
                    ))}
                  </div>
                ))}
                {Object.keys(grouped).length === 0 && (
                  <div style={{ padding: "14px", fontSize: 13, color: "#444", textAlign: "center",
                    fontFamily: "'Space Mono', monospace" }}>Brak wyników</div>
                )}
              </div>
              <div style={{ borderTop: "1px solid #252525", flexShrink: 0 }}>
                {!addMode ? (
                  <div onClick={() => setAddMode(true)}
                    style={{ padding: "12px", cursor: "pointer", fontSize: 13, color: "#e84c4c",
                      fontFamily: "'Space Mono', monospace", display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ fontSize: 18, lineHeight: 1 }}>+</span> Dodaj nowe miejsce
                  </div>
                ) : (
                  <div style={{ padding: 10, display: "flex", flexDirection: "column", gap: 6 }}>
                    <input value={newName} onChange={e => setNewName(e.target.value)} placeholder="Nazwa *"
                      onKeyDown={e => e.key === "Enter" && handleAdd()}
                      style={{ background: "#111", border: "1px solid #333", borderRadius: 5,
                        color: "#f0f0f0", padding: "8px", fontSize: 16, fontFamily: "'Space Mono', monospace", outline: "none" }} />
                    <div style={{ display: "flex", gap: 6 }}>
                      <input value={newCity} onChange={e => setNewCity(e.target.value)} placeholder="Miasto"
                        style={{ flex: 1, background: "#111", border: "1px solid #333", borderRadius: 5,
                          color: "#f0f0f0", padding: "8px", fontSize: 16, fontFamily: "'Space Mono', monospace", outline: "none" }} />
                      <select value={newCat} onChange={e => setNewCat(e.target.value)}
                        style={{ background: "#111", border: "1px solid #333", borderRadius: 5,
                          color: "#aaa", padding: "8px", fontSize: 16, fontFamily: "'Space Mono', monospace", cursor: "pointer", outline: "none" }}>
                        {VENUE_CATEGORIES.map(c => <option key={c}>{c}</option>)}
                      </select>
                    </div>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button onClick={handleAdd}
                        style={{ flex: 1, padding: "8px", background: "#e84c4c", border: "none",
                          borderRadius: 5, color: "#fff", fontSize: 13,
                          fontFamily: "'Bebas Neue', sans-serif", letterSpacing: "0.08em", cursor: "pointer" }}>DODAJ</button>
                      <button onClick={() => setAddMode(false)}
                        style={{ padding: "8px 12px", background: "#222", border: "1px solid #333",
                          borderRadius: 5, color: "#888", fontSize: 13, cursor: "pointer", fontFamily: "'Space Mono', monospace" }}>Anuluj</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── StarRating ────────────────────────────────────────────────
    function StarRating({ value, onChange }) {
      const [hover, setHover] = useState(0);
      return (
        <div style={{ display: "flex", gap: 4 }}>
          {[1,2,3,4,5].map(star => (
            <span key={star}
              onMouseEnter={() => onChange && setHover(star)}
              onMouseLeave={() => onChange && setHover(0)}
              onClick={() => onChange && onChange(star)}
              style={{ fontSize: 22, cursor: onChange ? "pointer" : "default",
                color: star <= (hover || value) ? "#f5c842" : "#333",
                transition: "color 0.15s", userSelect: "none" }}>★</span>
          ))}
        </div>
      );
    }

    // ── TicketCard ────────────────────────────────────────────────
    function TicketCard({ concert, onDelete, onCopy, onEdit, index, venues }) {
      const [visible, setVisible] = useState(false);
      useEffect(() => { const t = setTimeout(() => setVisible(true), index * 50); return () => clearTimeout(t); }, []);
      const color = GENRE_COLORS[concert.genre] || "#555";
      const venue = venues.find(v => v.id === concert.venueId);
      const venueName = venue ? venue.name : "";
      const catColor  = venue ? VENUE_CAT_COLORS[venue.category] : null;

      return (
        <div style={{ opacity: visible ? 1 : 0, transform: visible ? "translateY(0)" : "translateY(16px)",
          transition: "opacity 0.35s ease, transform 0.35s ease",
          background: "#141414", border: "1px solid #252525", borderLeft: `4px solid ${color}`,
          borderRadius: 10, padding: "14px 16px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", gap: 10 }}>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 4 }}>
                <span style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 22, letterSpacing: "0.05em", color: "#f0f0f0", lineHeight: 1 }}>{concert.band}</span>
                <span style={{ fontSize: 10, fontFamily: "'Space Mono', monospace", padding: "2px 7px", borderRadius: 20,
                  background: `${color}22`, color, border: `1px solid ${color}44` }}>{concert.genre}</span>
              </div>
              <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
                {venueName && (
                  <span style={{ fontSize: 12, color: "#777", fontFamily: "'Space Mono', monospace", display: "flex", alignItems: "center", gap: 4 }}>
                    📍
                    {catColor && <span style={{ fontSize: 9, padding: "1px 5px", borderRadius: 8,
                      background: `${catColor}22`, color: catColor, border: `1px solid ${catColor}33` }}>{venue.category}</span>}
                    {venueName}
                    {venue.city && <span style={{ color: "#444" }}>{venue.city}</span>}
                  </span>
                )}
                {concert.year && <span style={{ fontSize: 12, color: "#666", fontFamily: "'Space Mono', monospace" }}>📅 {concert.year}</span>}
                {concert.price > 0 && <span style={{ fontSize: 12, color: "#f5c842", fontFamily: "'Space Mono', monospace" }}>🎟 {Number(concert.price).toLocaleString("pl-PL")} zł</span>}
              </div>
              {concert.note && (
                <p style={{ margin: "8px 0 0", fontSize: 13, color: "#888", fontFamily: "Georgia, serif", fontStyle: "italic",
                  lineHeight: 1.5, borderTop: "1px solid #222", paddingTop: 8 }}>"{concert.note}"</p>
              )}
              <div style={{ marginTop: 8 }}><StarRating value={concert.rating || 0} /></div>
              <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
                <button onClick={() => onEdit(concert)}
                  style={{ flex: 1, padding: "8px", background: "#1e1e1e", border: "1px solid #333",
                    borderRadius: 7, color: "#ccc", cursor: "pointer", fontSize: 13,
                    fontFamily: "'Space Mono', monospace" }}>✏ Edytuj</button>
                <button onClick={() => onCopy(concert)}
                  style={{ flex: 1, padding: "8px", background: "#1e1e1e", border: "1px solid #333",
                    borderRadius: 7, color: "#ccc", cursor: "pointer", fontSize: 13,
                    fontFamily: "'Space Mono', monospace" }}>⧉ Kopiuj</button>
              </div>
            </div>
            <div style={{ flexShrink: 0 }}>
              <button onClick={() => onDelete(concert.id)}
                style={{ background: "none", border: "none", color: "#333", cursor: "pointer", fontSize: 20,
                  padding: "4px 6px", borderRadius: 6, lineHeight: 1 }}>×</button>
            </div>
          </div>
        </div>
      );
    }

    // ── BandRow ───────────────────────────────────────────────────
    function BandRow({ band, concerts, rank, index, venues }) {
      const [open, setOpen] = useState(false);
      const [visible, setVisible] = useState(false);
      useEffect(() => { const t = setTimeout(() => setVisible(true), index * 60); return () => clearTimeout(t); }, []);

      const color = GENRE_COLORS[concerts[0]?.genre] || "#555";
      const count = concerts.length;
      const rated = concerts.filter(c => c.rating);
      const avgRating = rated.length ? (rated.reduce((s, c) => s + c.rating, 0) / rated.length).toFixed(1) : null;
      const medal = rank === 1 ? "🥇" : rank === 2 ? "🥈" : rank === 3 ? "🥉" : null;

      return (
        <div style={{ opacity: visible ? 1 : 0, transform: visible ? "translateY(0)" : "translateY(16px)",
          transition: "opacity 0.35s ease, transform 0.35s ease" }}>
          <div onClick={() => setOpen(o => !o)} style={{
            background: open ? "#1a1a1a" : "#141414", border: "1px solid #252525",
            borderLeft: `4px solid ${color}`, borderRadius: open ? "10px 10px 0 0" : 10,
            padding: "14px 16px", cursor: "pointer", display: "flex", alignItems: "center", gap: 12,
            userSelect: "none" }}>
            <div style={{ width: 32, textAlign: "center", flexShrink: 0 }}>
              {medal ? <span style={{ fontSize: 22 }}>{medal}</span>
                : <span style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 18, color: "#444" }}>#{rank}</span>}
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                <span style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 22, letterSpacing: "0.05em", color: "#f0f0f0", lineHeight: 1 }}>{band}</span>
                <span style={{ fontSize: 10, fontFamily: "'Space Mono', monospace", padding: "2px 7px", borderRadius: 20,
                  background: `${color}22`, color, border: `1px solid ${color}44` }}>{concerts[0]?.genre}</span>
              </div>
              <div style={{ display: "flex", gap: 12, marginTop: 3, flexWrap: "wrap" }}>
                <span style={{ fontSize: 12, color: "#777", fontFamily: "'Space Mono', monospace" }}>{count}× na żywo</span>
                {avgRating && <span style={{ fontSize: 12, color: "#f5c842", fontFamily: "'Space Mono', monospace" }}>★ {avgRating} śr.</span>}
              </div>
            </div>
            <div style={{ display: "flex", gap: 3, flexShrink: 0, alignItems: "center" }}>
              {Array.from({ length: Math.min(count, 10) }).map((_, i) => (
                <div key={i} style={{ width: 7, height: 7, borderRadius: "50%", background: color, opacity: 0.5 + i * 0.05 }} />
              ))}
              {count > 10 && <span style={{ fontSize: 10, color: "#555", fontFamily: "'Space Mono', monospace" }}>+{count-10}</span>}
            </div>
            <span style={{ color: "#444", fontSize: 12, transition: "transform 0.2s", display: "inline-block",
              transform: open ? "rotate(90deg)" : "none" }}>▶</span>
          </div>
          {open && (
            <div style={{ background: "#111", border: "1px solid #252525", borderTop: "none",
              borderRadius: "0 0 10px 10px", padding: "0 16px 14px" }}>
              <div style={{ fontSize: 10, color: "#444", letterSpacing: "0.15em", textTransform: "uppercase",
                paddingTop: 12, marginBottom: 8, fontFamily: "'Space Mono', monospace" }}>Historia wizyt</div>
              {(() => {
                const priced = [...concerts].filter(c=>c.price>0).sort((a,b)=>(a.year||"0")>(b.year||"0")?1:-1);
                if(priced.length < 2) return null;
                const maxP = Math.max(...priced.map(c=>Number(c.price)));
                return (
                  <div style={{ marginBottom: 12, padding: "10px 0 6px" }}>
                    <div style={{ fontSize: 9, color: "#555", letterSpacing: "0.15em", textTransform: "uppercase",
                      fontFamily: "'Space Mono', monospace", marginBottom: 8 }}>Ceny biletów w czasie</div>
                    <div style={{ display: "flex", alignItems: "flex-end", gap: 6, height: 48 }}>
                      {priced.map((c, i) => {
                        const h = Math.max(6, Math.round((Number(c.price)/maxP)*44));
                        const prev = priced[i-1];
                        const trend = prev ? (Number(c.price) > Number(prev.price) ? "#e84c4c" : Number(c.price) < Number(prev.price) ? "#4ce87c" : "#888") : "#888";
                        return (
                          <div key={c.id} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3, flex: 1 }}>
                            <div style={{ fontSize: 8, color: trend, fontFamily: "'Space Mono', monospace", whiteSpace: "nowrap" }}>
                              {Number(c.price).toLocaleString("pl-PL")}
                            </div>
                            <div style={{ width: "100%", height: h, background: trend, borderRadius: "3px 3px 0 0", opacity: 0.8 }} />
                            <div style={{ fontSize: 8, color: "#444", fontFamily: "'Space Mono', monospace" }}>{c.year}</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })()}
              {[...concerts].sort((a,b) => (b.year||"0") > (a.year||"0") ? 1 : -1).map((c, i) => {
                const v = venues.find(vn => vn.id === c.venueId);
                return (
                  <div key={c.id} style={{ borderTop: i > 0 ? "1px solid #1e1e1e" : "none",
                    paddingTop: i > 0 ? 10 : 0, marginTop: i > 0 ? 10 : 0 }}>
                    <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
                      {v && <span style={{ fontSize: 12, color: "#666", fontFamily: "'Space Mono', monospace",
                        display: "flex", gap: 4, alignItems: "center" }}>
                        📍 <span style={{ fontSize: 9, padding: "1px 5px", borderRadius: 8,
                          background: `${VENUE_CAT_COLORS[v.category]}22`, color: VENUE_CAT_COLORS[v.category] }}>{v.category}</span>
                        {v.name}
                      </span>}
                      {c.year && <span style={{ fontSize: 12, color: "#555", fontFamily: "'Space Mono', monospace" }}>📅 {c.year}</span>}
                      {c.price > 0 && <span style={{ fontSize: 12, color: "#f5c842", fontFamily: "'Space Mono', monospace" }}>🎟 {Number(c.price).toLocaleString("pl-PL")} zł</span>}
                    </div>
                    {c.note && <p style={{ margin: "5px 0 0", fontSize: 13, color: "#777",
                      fontFamily: "Georgia, serif", fontStyle: "italic", lineHeight: 1.4 }}>"{c.note}"</p>}
                    {c.rating > 0 && <div style={{ marginTop: 5 }}><StarRating value={c.rating} /></div>}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }


    // ── City coordinates on SVG Poland map (300x320) ─────────────
    const CITY_COORDS = {
      "Warszawa":  {x:205,y:138}, "Warsaw":    {x:205,y:138},
      "Krakow":    {x:178,y:222}, "Kraków":    {x:178,y:222},
      "Gdansk":    {x:162,y:42},  "Gdańsk":    {x:162,y:42},
      "Gdynia":    {x:155,y:36},
      "Wroclaw":   {x:98,y:188},  "Wrocław":   {x:98,y:188},

    // ── StatsPanel ────────────────────────────────────────────────
    function StatsPanel({ concerts, venues }) {
      if (concerts.length === 0) return (
        <div style={{ textAlign: "center", padding: "60px 20px" }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>📊</div>
          <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 22, color: "#3a3a3a" }}>Brak danych do wykresu</div>
        </div>
      );

      const sectionTitle = (t) => (
        <div style={{ fontSize: 10, color: "#e84c4c", letterSpacing: "0.25em", textTransform: "uppercase",
          fontFamily: "'Space Mono', monospace", marginBottom: 14, marginTop: 4 }}>{t}</div>
      );

      // ── Year activity ──
      const yearCounts = {};
      concerts.forEach(c => { if (c.year) { yearCounts[c.year] = (yearCounts[c.year]||0)+1; } });
      const years = Object.keys(yearCounts).sort();
      const maxCount = Math.max(...Object.values(yearCounts), 1);

      // ── Avg price per year ──
      const yearPrices = {};
      concerts.forEach(c => {
        if (c.year && c.price > 0) {
          if (!yearPrices[c.year]) yearPrices[c.year] = [];
          yearPrices[c.year].push(Number(c.price));
        }
      });
      const priceYears = Object.keys(yearPrices).sort();
      const avgPrices  = priceYears.map(y => ({ year: y, avg: Math.round(yearPrices[y].reduce((a,b)=>a+b,0)/yearPrices[y].length) }));
      const maxAvg = avgPrices.length > 0 ? Math.max(...avgPrices.map(p=>p.avg), 1) : 1;

      // ── City ranking ──
      const cityMap = {};
      concerts.forEach(c => {
        const v = venues.find(vn=>vn.id===c.venueId);
        if (v && v.city) { cityMap[v.city] = (cityMap[v.city]||0)+1; }
      });
      const cityRanked = Object.entries(cityMap).sort((a,b)=>b[1]-a[1]);
      const maxCity = cityRanked.length > 0 ? cityRanked[0][1] : 1;

      // ── Map pins ──
      const mapCities = {};
      concerts.forEach(c => {
        const v = venues.find(vn=>vn.id===c.venueId);
        if (v && v.city) { mapCities[v.city] = (mapCities[v.city]||0)+1; }
      });
      const mapMaxCount = Math.max(...Object.values(mapCities), 1);

      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>

          {/* Year activity chart */}
          {years.length > 0 && (
            <div style={{ background: "#141414", border: "1px solid #252525", borderRadius: 12, padding: "16px 16px 12px" }}>
              {sectionTitle("Aktywność per rok")}
              <div style={{ display: "flex", alignItems: "flex-end", gap: 4, height: 80, overflowX: "auto", paddingBottom: 4 }}>
                {years.map(y => {
                  const h = Math.max(4, Math.round((yearCounts[y]/maxCount)*72));
                  const isBest = yearCounts[y] === maxCount;
                  return (
                    <div key={y} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3, minWidth: 32, flex: 1 }}>
                      <div style={{ fontSize: 9, color: isBest ? "#f5c842" : "#666", fontFamily: "'Space Mono', monospace" }}>{yearCounts[y]}</div>
                      <div style={{ width: "100%", height: h, borderRadius: "3px 3px 0 0",
                        background: isBest ? "linear-gradient(180deg,#f5c842,#e8a000)" : "linear-gradient(180deg,#e84c4c,#a02020)" }} />
                      <div style={{ fontSize: 8, color: "#555", fontFamily: "'Space Mono', monospace", whiteSpace: "nowrap" }}>
                        {y.toString().slice(2)}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Avg price per year */}
          {avgPrices.length >= 2 && (
            <div style={{ background: "#141414", border: "1px solid #252525", borderRadius: 12, padding: "16px 16px 12px" }}>
              {sectionTitle("Średnia cena biletu per rok")}
              <div style={{ display: "flex", alignItems: "flex-end", gap: 4, height: 80, overflowX: "auto", paddingBottom: 4 }}>
                {avgPrices.map((p, i) => {
                  const h = Math.max(4, Math.round((p.avg/maxAvg)*72));
                  const prev = avgPrices[i-1];
                  const color = !prev ? "#888" : p.avg > prev.avg ? "#e84c4c" : p.avg < prev.avg ? "#4ce87c" : "#888";
                  return (
                    <div key={p.year} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3, minWidth: 36, flex: 1 }}>
                      <div style={{ fontSize: 8, color, fontFamily: "'Space Mono', monospace", whiteSpace: "nowrap" }}>
                        {p.avg.toLocaleString("pl-PL")}
                      </div>
                      <div style={{ width: "100%", height: h, borderRadius: "3px 3px 0 0", background: color, opacity: 0.85 }} />
                      <div style={{ fontSize: 8, color: "#555", fontFamily: "'Space Mono', monospace" }}>{p.year.toString().slice(2)}</div>
                    </div>
                  );
                })}
              </div>
              <div style={{ fontSize: 9, color: "#444", fontFamily: "'Space Mono', monospace", marginTop: 6 }}>
                🟢 taniej  🔴 drożej niż rok wcześniej
              </div>
            </div>
          )}

          {/* City ranking */}
          {cityRanked.length > 0 && (
            <div style={{ background: "#141414", border: "1px solid #252525", borderRadius: 12, padding: "16px" }}>
              {sectionTitle("Ranking miast")}
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {cityRanked.map(([city, count], i) => (
                  <div key={city} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 20, textAlign: "right", fontFamily: "'Bebas Neue', sans-serif",
                      fontSize: 16, color: i===0?"#f5c842":i===1?"#b0b8c1":i===2?"#cd7f32":"#444", flexShrink: 0 }}>
                      {i===0?"🥇":i===1?"🥈":i===2?"🥉":`#${i+1}`}
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                        <span style={{ fontSize: 13, color: "#ccc", fontFamily: "'Space Mono', monospace" }}>{city}</span>
                        <span style={{ fontSize: 11, color: "#e84c4c", fontFamily: "'Space Mono', monospace" }}>{count}×</span>
                      </div>
                      <div style={{ height: 4, background: "#1e1e1e", borderRadius: 2, overflow: "hidden" }}>
                        <div style={{ height: "100%", width: `${Math.round((count/maxCity)*100)}%`,
                          background: "linear-gradient(90deg,#e84c4c,#a02020)", borderRadius: 2 }} />
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Map of Poland */}
          {Object.keys(mapCities).length > 0 && (
            <div style={{ background: "#141414", border: "1px solid #252525", borderRadius: 12, padding: "16px" }}>
              {sectionTitle("Mapa koncertów")}
              <div style={{ position: "relative", width: "100%", maxWidth: 340, margin: "0 auto" }}>
                <svg viewBox="0 0 300 320" style={{ width: "100%", opacity: 0.9 }}>
                  {/* Poland outline - simplified */}
                  <path d="M52,68 L65,52 L88,42 L115,38 L140,32 L162,36 L178,30 L200,35 L222,30 L248,42 L268,55 L278,72 L272,90 L258,90 L252,108 L262,128 L270,148 L265,168 L258,182 L248,198 L238,212 L228,232 L218,248 L205,258 L190,262 L175,258 L162,248 L148,238 L135,228 L122,215 L108,205 L98,188 L88,175 L78,162 L68,148 L55,132 L48,115 L42,98 L52,68 Z"
                    fill="#1a1a1a" stroke="#333" strokeWidth="1.5" />
                  {/* City pins */}
                  {Object.entries(mapCities).map(([city, cnt]) => {
                    const coord = CITY_COORDS[city];
                    if (!coord) return null;
                    const r = Math.max(5, Math.min(14, 5 + Math.round((cnt/mapMaxCount)*9)));
                    return (
                      <g key={city}>
                        <circle cx={coord.x} cy={coord.y} r={r} fill="#e84c4c" opacity={0.75} />
                        <circle cx={coord.x} cy={coord.y} r={2} fill="#fff" opacity={0.9} />
                        <text x={coord.x} y={coord.y - r - 3} textAnchor="middle"
                          style={{ fontSize: 7, fill: "#ccc", fontFamily: "Space Mono, monospace" }}>
                          {city}
                        </text>
                      </g>
                    );
                  })}
                </svg>
                <div style={{ fontSize: 9, color: "#444", fontFamily: "'Space Mono', monospace", textAlign: "center", marginTop: 4 }}>
                  Rozmiar kółka = liczba koncertów w mieście
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // ── Styles ────────────────────────────────────────────────────
    const labelSt = { display: "block", fontSize: 10, color: "#555", letterSpacing: "0.15em",
      textTransform: "uppercase", marginBottom: 4, fontFamily: "'Space Mono', monospace" };
    const inputSt = { width: "100%", background: "#1a1a1a", border: "1px solid #2a2a2a", borderRadius: 6,
      color: "#f0f0f0", padding: "10px", fontSize: 16, fontFamily: "'Space Mono', monospace",
      outline: "none", boxSizing: "border-box" };

    // ── App ───────────────────────────────────────────────────────
    function App() {
      const [concerts,    setConcerts]    = useState([]);
      const [venues,      setVenues]      = useState(DEFAULT_VENUES);
      const [loaded,      setLoaded]      = useState(false);
      const [saveMsg,     setSaveMsg]     = useState("");
      const [tab,         setTab]         = useState("lista");
      const [showForm,    setShowForm]    = useState(false);
      const [search,      setSearch]      = useState("");
      const [filterGenre, setFilterGenre] = useState("Wszystkie");
      const [sortBy,      setSortBy]      = useState("rok_desc");
      const [suggestions, setSuggestions] = useState([]);
      const [error,       setError]       = useState("");
      const [form, setForm] = useState({ band: "", venueId: null, year: "", genre: "Rock", rating: 0, price: "", note: "" });
      const [editId, setEditId] = useState(null);
      const inputRef  = useRef();
      const importRef = useRef();

      useEffect(() => {
        const saved = dataLoad();
        if (saved) {
          if (saved.concerts) setConcerts(saved.concerts);
          if (saved.venues)   setVenues(saved.venues);
        }
        setLoaded(true);
      }, []);

      useEffect(() => { if (showForm) setTimeout(() => inputRef.current?.focus(), 50); }, [showForm]);

      const save = (newConcerts, newVenues) => {
        dataSave({ concerts: newConcerts, venues: newVenues });
        setSaveMsg("✓ zapisano");
        setTimeout(() => setSaveMsg(""), 2000);
      };

      const exportCSV = () => {
        const esc = (v) => '"' + String(v || "").replace(/"/g, '""') + '"';
        const header = ["zespol","gatunek","rok","ocena","cena","miejsce","miasto","kategoria","notatka"];
        const rows = concerts.map(c => {
          const v = venues.find(vn => vn.id === c.venueId);
          return [c.band,c.genre,c.year,c.rating,c.price||"",v?v.name:"",v?v.city:"",v?v.category:"",c.note||""].map(esc).join(",");
        });
        const csv  = [header.join(","), ...rows].join("\n");
        const blob = new Blob(["\uFEFF"+csv], { type: "text/csv;charset=utf-8;" });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href = url; a.download = "koncerty_backup.csv"; a.click();
        URL.revokeObjectURL(url);
        setSaveMsg("\u2713 wyeksportowano " + concerts.length + " koncert\u00f3w");
        setTimeout(() => setSaveMsg(""), 3000);
      };

      const importCSV = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const text  = ev.target.result.replace(/^\uFEFF/, "");
            const lines = text.trim().split("\n");
            const hdrs  = lines[0].split(",").map(h => h.replace(/"/g,"").trim());
            const parseRow = (line) => {
              const cols=[]; let cur=""; let inQ=false;
              for(let i=0;i<line.length;i++){
                const ch=line[i];
                if(ch==='"'){inQ=!inQ;}
                else if(ch===","&&!inQ){cols.push(cur);cur="";}
                else cur+=ch;
              }
              cols.push(cur);
              return cols.map(c=>c.replace(/^"|"$/g,"").replace(/""/g,'"'));
            };
            const newVenues = [...venues];
            const imported = lines.slice(1).filter(l=>l.trim()).map(line => {
              const cols=parseRow(line);
              const get=(name)=>cols[hdrs.indexOf(name)]||"";
              const vName=get("miejsce"),vCity=get("miasto"),vCat=get("kategoria")||"Inne";
              let venueId=null;
              if(vName){
                let v=newVenues.find(vn=>vn.name.toLowerCase()===vName.toLowerCase());
                if(!v){v={id:Date.now()+Math.random(),name:vName,city:vCity,category:VENUE_CATEGORIES.includes(vCat)?vCat:"Inne"};newVenues.push(v);}
                venueId=v.id;
              }
              return {id:Date.now()+Math.random(),band:get("zespol"),genre:get("gatunek")||"Rock",
                year:get("rok"),rating:Number(get("ocena"))||0,price:get("cena")||"",venueId,note:get("notatka")};
            });
            if(!imported.length){setSaveMsg("\u2717 brak danych w pliku");return;}
            const merged=[...imported,...concerts.filter(c=>!imported.find(i=>i.band===c.band&&i.year===c.year&&i.venueId===c.venueId))];
            setConcerts(merged);setVenues(newVenues);save(merged,newVenues);
            setSaveMsg("\u2713 zaimportowano "+imported.length+" koncert\u00f3w");
            setTimeout(()=>setSaveMsg(""),3000);
          } catch(err){setSaveMsg("\u2717 b\u0142\u0105d: "+err.message);}
          e.target.value="";
        };
        reader.readAsText(file,"UTF-8");
      };

      const bandMap = {};
      concerts.forEach(c => { if (!bandMap[c.band]) bandMap[c.band] = []; bandMap[c.band].push(c); });

      const handleBandInput = (v) => {
        setForm(f => ({ ...f, band: v }));
        const bands = Object.keys(bandMap).sort();
        setSuggestions(v.length > 0
          ? bands.filter(b => b.toLowerCase().startsWith(v.toLowerCase()) && b.toLowerCase() !== v.toLowerCase())
          : []);
      };

      const addConcert = () => {
        if (!form.band.trim()) { setError("Podaj nazwę zespołu!"); return; }
        let newConcerts;
        if (editId) {
          newConcerts = concerts.map(c => c.id === editId ? { ...form, band: form.band.trim(), id: editId } : c);
        } else {
          newConcerts = [{ ...form, band: form.band.trim(), id: Date.now() }, ...concerts];
        }
        setConcerts(newConcerts);
        save(newConcerts, venues);
        setForm({ band: "", venueId: null, year: "", genre: "Rock", rating: 0, price: "", note: "" });
        setSuggestions([]); setError(""); setShowForm(false); setEditId(null);
      };

      const deleteConcert = (id) => {
        const newConcerts = concerts.filter(c => c.id !== id);
        setConcerts(newConcerts);
        save(newConcerts, venues);
      };

      const editConcert = (c) => {
        setForm({ band: c.band, venueId: c.venueId||null, year: c.year||"", genre: c.genre||"Rock",
          rating: c.rating||0, price: c.price||"", note: c.note||"" });
        setEditId(c.id);
        setShowForm(true);
        setSuggestions([]);
        window.scrollTo({ top: 0, behavior: "smooth" });
        setTimeout(() => inputRef.current?.focus(), 300);
      };

      const addVenue = ({ name, city, category }) => {
        const v = { id: Date.now(), name, city, category };
        const newVenues = [...venues, v];
        setVenues(newVenues);
        save(concerts, newVenues);
        setForm(f => ({ ...f, venueId: v.id }));
      };

      const copyFrom = (c) => {
        setForm({ band: "", venueId: c.venueId, year: c.year || "", genre: c.genre, rating: 0, price: "", note: "" });
        setShowForm(true); setSuggestions([]);
        setTimeout(() => inputRef.current?.focus(), 80);
      };

      const filtered = concerts.filter(c => {
        const q = search.toLowerCase();
        const v = venues.find(vn => vn.id === c.venueId);
        return (filterGenre === "Wszystkie" || c.genre === filterGenre) &&
          (c.band.toLowerCase().includes(q) || (v?.name || "").toLowerCase().includes(q));
      }).sort((a, b) => {
        if (sortBy === "rok_desc") return (b.year||"0") > (a.year||"0") ? 1 : -1;
        if (sortBy === "rok_asc")  return (a.year||"0") > (b.year||"0") ? 1 : -1;
        if (sortBy === "nazwa")    return a.band.localeCompare(b.band);
        if (sortBy === "ocena")    return (b.rating||0) - (a.rating||0);
        return 0;
      });

      const ranked = Object.entries(bandMap)
        .filter(([b]) => b.toLowerCase().includes(search.toLowerCase()))
        .sort((a, b) => b[1].length - a[1].length || a[0].localeCompare(b[0]));

      const genreStats = GENRES.reduce((acc, g) => { acc[g] = concerts.filter(c => c.genre === g).length; return acc; }, {});
      const mostSeen  = Object.entries(bandMap).sort((a,b) => b[1].length - a[1].length)[0];
      const topGenre  = concerts.length > 0 ? Object.entries(genreStats).sort((a,b) => b[1]-a[1])[0]?.[0] : "—";
      const venueMap  = {};
      concerts.forEach(c => { if(c.venueId){ const v=venues.find(vn=>vn.id===c.venueId); if(v){ if(!venueMap[v.name]) venueMap[v.name]=new Set(); venueMap[v.name].add(c.band); } } });
      const topVenue   = Object.entries(venueMap).sort((a,b)=>b[1].size-a[1].size)[0];
      const totalSpent = concerts.reduce((s,c)=>s+(Number(c.price)||0),0);

      return (
        <div style={{ minHeight: "100vh", background: "#0d0d0d",
          backgroundImage: "radial-gradient(ellipse at 20% 20%, #1a1a2e 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, #1a0a0a 0%, transparent 50%)",
          color: "#f0f0f0", fontFamily: "'Space Mono', monospace", paddingBottom: 80 }}>

          {/* Header */}
          <div style={{ borderBottom: "1px solid #1e1e1e", padding: "32px 24px 20px", textAlign: "center" }}>
            <div style={{ fontSize: 10, letterSpacing: "0.3em", color: "#e84c4c", textTransform: "uppercase", marginBottom: 4 }}>
              Live Music Tracker
            </div>
            <h1 style={{ margin: 0, fontFamily: "'Bebas Neue', sans-serif",
              fontSize: "clamp(42px, 10vw, 72px)", letterSpacing: "0.08em", lineHeight: 1,
              background: "linear-gradient(135deg, #f0f0f0 40%, #666)",
              WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
              BYŁEM NA ŻYWO
            </h1>
            <div style={{ display: "flex", justifyContent: "center", gap: 28, marginTop: 16, flexWrap: "wrap" }}>
              {[
                { label: "Zespołów",    val: Object.keys(bandMap).length },
                { label: "Top zespół",  val: mostSeen ? `${mostSeen[0]} (${mostSeen[1].length}×)` : "—" },
                { label: "Top gatunek", val: topGenre },
                { label: "Top miejsce", val: topVenue ? `${topVenue[0]} (${topVenue[1].size})` : "—" },
                { label: "Wydane", val: totalSpent > 0 ? totalSpent.toLocaleString("pl-PL") + " zł" : "—" },
              ].map(s => (
                <div key={s.label} style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 22, fontFamily: "'Bebas Neue', sans-serif", color: "#e84c4c", lineHeight: 1 }}>{s.val}</div>
                  <div style={{ fontSize: 9, color: "#444", letterSpacing: "0.15em", textTransform: "uppercase" }}>{s.label}</div>
                </div>
              ))}
            </div>
            <div style={{ marginTop: 8, fontSize: 11, fontFamily: "'Space Mono', monospace", minHeight: 16 }}>
              {saveMsg && <span style={{ color: saveMsg.startsWith("\u2717") ? "#e84c4c" : "#4ce87c" }}>{saveMsg}</span>}
            </div>
            <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 10 }}>
              <button onClick={exportCSV}
                style={{ background: "#1a1a1a", border: "1px solid #333", borderRadius: 8,
                  color: "#aaa", padding: "7px 14px", fontSize: 11, cursor: "pointer",
                  fontFamily: "'Space Mono', monospace", display: "flex", alignItems: "center", gap: 5 }}>
                ⬇ Eksport CSV
              </button>
              <button onClick={() => importRef.current.click()}
                style={{ background: "#1a1a1a", border: "1px solid #333", borderRadius: 8,
                  color: "#aaa", padding: "7px 14px", fontSize: 11, cursor: "pointer",
                  fontFamily: "'Space Mono', monospace", display: "flex", alignItems: "center", gap: 5 }}>
                ⬆ Import CSV
              </button>
              <input ref={importRef} type="file" accept=".csv" onChange={importCSV} style={{ display: "none" }} />
            </div>
          </div>

          <div style={{ maxWidth: 720, margin: "0 auto", padding: "0 16px" }}>

            {/* Tabs */}
            <div style={{ display: "flex", margin: "20px 0 16px", borderBottom: "1px solid #1e1e1e" }}>
              {[["lista","📋 Lista"],["ranking","🏆 Ranking"],["statystyki","📊 Statystyki"]].map(([key, label]) => (
                <button key={key} onClick={() => { setTab(key); setSearch(""); }}
                  style={{ padding: "10px 20px", background: "none", border: "none",
                    borderBottom: tab === key ? "2px solid #e84c4c" : "2px solid transparent",
                    color: tab === key ? "#f0f0f0" : "#555", fontFamily: "'Space Mono', monospace",
                    fontSize: 12, cursor: "pointer", marginBottom: -1 }}>
                  {label}
                </button>
              ))}
            </div>

            {/* Add button */}
            {tab !== 'statystyki' && <button onClick={() => { setShowForm(f => { if(f){ setEditId(null); setForm({ band:"", venueId:null, year:"", genre:"Rock", rating:0, price:"", note:"" }); } return !f; }); }} style={{
              width: "100%", padding: "14px",
              background: showForm ? "#1e1e1e" : "linear-gradient(135deg, #e84c4c, #c0392b)",
              border: "none", borderRadius: 10, color: "#fff", fontSize: 14,
              fontFamily: "'Bebas Neue', sans-serif", letterSpacing: "0.1em",
              cursor: "pointer", marginBottom: 12 }}>
              {showForm ? "↑ ANULUJ" : editId ? "✏ EDYTUJESZ WPIS" : "+ DODAJ KONCERT"}
            </button>}

            {/* Form */}
            {showForm && (
              <div style={{ background: "#141414", border: "1px solid #2a2a2a", borderRadius: 12,
                padding: 20, marginBottom: 16, display: "flex", flexDirection: "column", gap: 12 }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>

                  <div style={{ gridColumn: "1 / -1", position: "relative" }}>
                    <label style={labelSt}>Zespół / Artysta *</label>
                    <input ref={inputRef} value={form.band} onChange={e => handleBandInput(e.target.value)}
                      onKeyDown={e => { if (e.key === "Enter") addConcert(); if (e.key === "Escape") setSuggestions([]); }}
                      placeholder="np. Metallica" style={inputSt} autoComplete="off" />
                    {suggestions.length > 0 && (
                      <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: "#1e1e1e",
                        border: "1px solid #333", borderRadius: "0 0 8px 8px", zIndex: 10, overflow: "hidden" }}>
                        {suggestions.slice(0, 5).map(s => (
                          <div key={s} onClick={() => { setForm(f => ({...f, band: s})); setSuggestions([]); }}
                            style={{ padding: "10px 12px", cursor: "pointer", fontSize: 14,
                              fontFamily: "'Space Mono', monospace", color: "#ccc",
                              display: "flex", alignItems: "center", gap: 8 }}>
                            <span style={{ color: "#e84c4c", fontSize: 10 }}>↺</span>
                            {s}
                            <span style={{ fontSize: 11, color: "#555", marginLeft: "auto" }}>{bandMap[s]?.length}× widziany</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                  <div style={{ gridColumn: "1 / -1" }}>
                    <label style={labelSt}>Miejsce / Klub</label>
                    <VenuePicker value={form.venueId} onChange={id => setForm(f => ({...f, venueId: id}))}
                      venues={venues} onAddVenue={addVenue} />
                  </div>

                  {form.venueId && venues.find(v=>v.id===form.venueId)?.category === "Festiwal" && !editId && (
                    <div style={{ gridColumn: "1 / -1", background: "#1a1a0a", border: "1px solid #f5c84233",
                      borderRadius: 6, padding: "8px 12px", fontSize: 11, color: "#f5c842",
                      fontFamily: "'Space Mono', monospace", lineHeight: 1.5 }}>
                      💡 Festiwal: wpisz cenę biletu tylko przy pierwszym zespole. Kolejne dodaj przez ⧉ — miejsce i rok się skopiują.
                    </div>
                  )}

                  <div>
                    <label style={labelSt}>Rok</label>
                    <input type="number" min="1950" max="2099" value={form.year}
                      onChange={e => setForm(f => ({...f, year: e.target.value}))}
                      placeholder={String(new Date().getFullYear())}
                      style={inputSt} />
                  </div>
                  <div>
                    <label style={labelSt}>Gatunek</label>
                    <select value={form.genre} onChange={e => setForm(f => ({...f, genre: e.target.value}))}
                      style={{...inputSt, cursor: "pointer"}}>
                      {GENRES.map(g => <option key={g}>{g}</option>)}
                    </select>
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                    <label style={labelSt}>Ocena</label>
                    <StarRating value={form.rating} onChange={v => setForm(f => ({...f, rating: v}))} />
                  </div>
                  <div>
                    <label style={labelSt}>Cena biletu (zł)</label>
                    <input type="number" min="0" value={form.price}
                      onChange={e => setForm(f => ({...f, price: e.target.value}))}
                      placeholder="np. 150"
                      style={inputSt} />
                  </div>
                </div>
                <div>
                  <label style={labelSt}>Notatka</label>
                  <textarea value={form.note} onChange={e => setForm(f => ({...f, note: e.target.value}))}
                    placeholder="Co zapamiętałeś z tego koncertu?" rows={2}
                    style={{...inputSt, resize: "vertical", fontStyle: "italic"}} />
                </div>
                {error && <div style={{ color: "#e84c4c", fontSize: 13 }}>{error}</div>}
                <button onClick={addConcert} style={{ padding: "14px",
                  background: "linear-gradient(135deg, #e84c4c, #c0392b)", border: "none",
                  borderRadius: 8, color: "#fff", fontSize: 14,
                  fontFamily: "'Bebas Neue', sans-serif", letterSpacing: "0.1em", cursor: "pointer" }}>
                  {editId ? "ZAPISZ ZMIANY" : "ZAPISZ KONCERT"}
                </button>
              </div>
            )}

            {/* Search + filters */}
            {tab !== 'statystyki' && <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
              <input value={search} onChange={e => setSearch(e.target.value)}
                placeholder={tab === "lista" ? "Szukaj…" : "Szukaj zespołu…"}
                style={{ flex: 1, minWidth: 140, background: "#161616", border: "1px solid #222",
                  borderRadius: 8, color: "#f0f0f0", padding: "10px 12px", fontSize: 16,
                  fontFamily: "'Space Mono', monospace", outline: "none" }} />
              {tab === "lista" && <>
                <select value={filterGenre} onChange={e => setFilterGenre(e.target.value)}
                  style={{ background: "#161616", border: "1px solid #222", borderRadius: 8,
                    color: "#aaa", padding: "10px", fontSize: 16,
                    fontFamily: "'Space Mono', monospace", cursor: "pointer", outline: "none" }}>
                  <option>Wszystkie</option>
                  {GENRES.map(g => <option key={g}>{g}</option>)}
                </select>
                <select value={sortBy} onChange={e => setSortBy(e.target.value)}
                  style={{ background: "#161616", border: "1px solid #222", borderRadius: 8,
                    color: "#aaa", padding: "10px", fontSize: 16,
                    fontFamily: "'Space Mono', monospace", cursor: "pointer", outline: "none" }}>
                  <option value="rok_desc">Rok ↓</option>
                  <option value="rok_asc">Rok ↑</option>
                  <option value="nazwa">Nazwa A–Z</option>
                  <option value="ocena">Ocena ↓</option>
                </select>
              </>}
            </div>}

            {/* Genre pills */}
            {tab === "lista" && (
              <div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginBottom: 14 }}>
                {GENRES.filter(g => genreStats[g] > 0).map(g => (
                  <span key={g} onClick={() => setFilterGenre(filterGenre === g ? "Wszystkie" : g)}
                    style={{ fontSize: 10, padding: "4px 10px", borderRadius: 20,
                      background: filterGenre === g ? `${GENRE_COLORS[g]}33` : "#161616",
                      color: filterGenre === g ? GENRE_COLORS[g] : "#444",
                      border: `1px solid ${filterGenre === g ? GENRE_COLORS[g]+"55" : "#222"}`,
                      cursor: "pointer", userSelect: "none" }}>
                    {g} {genreStats[g]}
                  </span>
                ))}
              </div>
            )}

            {/* Content */}
            {!loaded
              ? <div style={{ textAlign: "center", color: "#333", padding: 40 }}>Ładowanie…</div>
              : tab === "statystyki"
                ? <StatsPanel concerts={concerts} venues={venues} />
                : tab === "lista"
                  ? filtered.length === 0
                    ? <div style={{ textAlign: "center", padding: "60px 20px" }}>
                        <div style={{ fontSize: 48, marginBottom: 12 }}>🎸</div>
                        <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 22, color: "#3a3a3a" }}>
                          {concerts.length === 0 ? "Dodaj swój pierwszy koncert!" : "Brak wyników"}
                        </div>
                      </div>
                    : <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                        {filtered.map((c, i) => <TicketCard key={c.id} concert={c} onDelete={deleteConcert} onCopy={copyFrom} onEdit={editConcert} index={i} venues={venues} />)}
                      </div>
                  : ranked.length === 0
                    ? <div style={{ textAlign: "center", padding: "60px 20px" }}>
                        <div style={{ fontSize: 48, marginBottom: 12 }}>🏆</div>
                        <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 22, color: "#3a3a3a" }}>
                          {concerts.length === 0 ? "Brak danych do rankingu" : "Brak wyników"}
                        </div>
                      </div>
                    : <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                        {ranked.map(([band, cs], i) => (
                          <BandRow key={band} band={band} concerts={cs} rank={i+1} index={i} venues={venues} />
                        ))}
                      </div>
            }
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
